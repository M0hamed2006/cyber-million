<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مؤثرات حلوة أوووي 🔥</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      min-height: 100vh;
      overflow-x: hidden;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .glass {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .neon-text {
      text-shadow: 
        0 0 10px #ff00ff,
        0 0 20px #ff00ff,
        0 0 40px #00ffff,
        0 0 80px #00ffff;
      animation: neonPulse 2s infinite alternate;
    }

    @keyframes neonPulse {
      from { text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
      to { text-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff, 0 0 80px #00ffff; }
    }

    .btn-neon {
      position: relative;
      overflow: hidden;
      transition: all 0.4s ease;
    }

    .btn-neon:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 0 30px #00ffff, 0 0 60px #ff00ff;
    }

    .btn-neon::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 40%;
      height: 400%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.4),
        transparent
      );
      transform: skewX(-25deg);
      animation: shine 4s infinite;
    }

    @keyframes shine {
      100% { transform: translateX(400%); }
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: floatParticle 15s linear infinite;
      opacity: 0.6;
    }

    @keyframes floatParticle {
      0% { transform: translateY(100vh) scale(0.5); }
      100% { transform: translateY(-100px) scale(1.2); }
    }

    .card-hover {
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .card-hover:hover {
      transform: rotate(3deg) scale(1.08) translateY(-15px);
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6 text-white">

  <div class="glass max-w-md w-full rounded-3xl p-10 text-center relative overflow-hidden">
    
    <!-- Particles Container -->
    <div id="particles" class="absolute inset-0 pointer-events-none"></div>

    <h1 class="text-5xl font-black neon-text mb-6 tracking-wider">
      مرحبا يا محمد! 🔥
    </h1>

    <p class="text-xl mb-10 opacity-90">
      الكود دلوقتي مليان مؤثرات حلوة أوووي زي ما طلبت
    </p>

    <div class="space-y-6">
      <button onclick="launchConfetti()" 
              class="btn-neon w-full py-5 text-2xl font-bold rounded-2xl bg-gradient-to-r from-purple-600 to-cyan-500 hover:from-pink-500 hover:to-violet-600">
        اضغطني وشوف السحر 🎉
      </button>

      <div class="grid grid-cols-2 gap-4">
        <div class="glass card-hover p-6 rounded-2xl">
          <i class="fas fa-heart text-4xl text-pink-400 mb-3"></i>
          <p class="font-bold">تأثير Glass</p>
        </div>
        <div class="glass card-hover p-6 rounded-2xl">
          <i class="fas fa-bolt text-4xl text-yellow-400 mb-3"></i>
          <p class="font-bold">Neon Glow</p>
        </div>
      </div>
    </div>

    <div class="mt-12 text-xs opacity-50">
      Made with ❤️ + Tailwind + Pure CSS Magic
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script>
    // إنشاء Particles خلفية
    function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 40; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        
        const size = Math.random() * 6 + 3;
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.left = `${Math.random() * 100}%`;
        particle.style.background = `hsl(${Math.random()*360}, 100%, 80%)`;
        particle.style.animationDuration = `${Math.random() * 20 + 15}s`;
        particle.style.animationDelay = `-${Math.random() * 20}s`;
        particle.style.opacity = Math.random() * 0.7 + 0.3;
        
        container.appendChild(particle);
      }
    }

    // Confetti Function
    function launchConfetti() {
      confetti({
        particleCount: 200,
        spread: 80,
        origin: { y: 0.6 }
      });
      
      setTimeout(() => {
        confetti({
          particleCount: 150,
          angle: 60,
          spread: 70,
          origin: { x: 0 }
        });
      }, 300);

      // صوت خفيف (اختياري)
      console.log("%c🎉 يا سلام عليك! التأثيرات شغالة 🔥", "color: #ff00ff; font-size: 18px; font-weight: bold;");
    }

    // تشغيل كل حاجة لما الصفحة تحمل
    window.onload = () => {
      createParticles();
      
      // إضافة تأثير إضافي على الـ body لما تضغط في أي مكان
      document.addEventListener('click', (e) => {
        if (Math.random() > 0.7) {
          const miniConfetti = document.createElement('div');
          miniConfetti.textContent = '✨';
          miniConfetti.style.position = 'absolute';
          miniConfetti.style.left = `${e.clientX}px`;
          miniConfetti.style.top = `${e.clientY}px`;
          miniConfetti.style.fontSize = '20px';
          miniConfetti.style.pointerEvents = 'none';
          miniConfetti.style.zIndex = '9999';
          document.body.appendChild(miniConfetti);
          
          setTimeout(() => miniConfetti.remove(), 1500);
        }
      });
    };
  </script>
</body>
</html>
