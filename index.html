<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🔥 الحقيقة أو التحدي</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="text-white">

  <div class="max-w-2xl mx-auto p-6">

    <div class="text-center mb-10 pt-8">
      <h1 class="text-5xl font-bold mb-2">🔥 الحقيقة أو التحدي</h1>
      <p class="text-xl opacity-90">ميتزهقش أبدًا!</p>
    </div>

    <div class="bg-white/10 backdrop-blur-lg rounded-3xl p-6 mb-8">
      <h2 class="text-2xl font-semibold mb-4">اللاعبين</h2>
      <div id="players-list" class="flex flex-wrap gap-3 mb-4"></div>

      <div class="flex gap-3">
        <input id="player-name" type="text" placeholder="اسم اللاعب..."
               class="flex-1 bg-white/20 rounded-2xl px-5 py-3"/>
        <button onclick="addPlayer()" class="bg-pink-500 px-6 rounded-2xl">
          + إضافة
        </button>
      </div>
    </div>

    <button onclick="startGame()" class="w-full py-5 bg-pink-500 rounded-2xl text-2xl">
      🎲 ابدأ اللعبة
    </button>

    <div id="game-area" class="hidden mt-8 text-center">
      <h2 id="current-player" class="text-3xl mb-6"></h2>
      <div id="question" class="text-2xl mb-6"></div>

      <button onclick="nextQuestion()" class="bg-white text-black px-6 py-3 rounded-xl">
        التالي
      </button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
