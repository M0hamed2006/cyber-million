<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🔥 الحقيقة أو التحدي - النسخة الأسطورية</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body {
      background: linear-gradient(135deg, #1e3a8a, #7e22ce, #ec4899);
      min-height: 100vh;
      font-family: 'Cairo', system-ui, sans-serif;
    }
    .card {
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .card:hover {
      transform: scale(1.05) rotate(2deg);
    }
    .question-box {
      animation: pop 0.6s ease-out;
    }
    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body class="text-white">

  <div class="max-w-2xl mx-auto p-6">

    <!-- الهيدر -->
    <div class="text-center mb-10 pt-8">
      <h1 class="text-5xl font-bold mb-2 flex items-center justify-center gap-3">
        🔥 الحقيقة أو التحدي
      </h1>
      <p class="text-xl opacity-90">ميتزهقش أبدًا... أكتر من 300 سؤال وتحدي!</p>
    </div>

    <!-- إعدادات اللاعبين -->
    <div class="bg-white/10 backdrop-blur-lg rounded-3xl p-6 mb-8">
      <h2 class="text-2xl font-semibold mb-4">اللاعبين</h2>
      <div id="players-list" class="flex flex-wrap gap-3 mb-4"></div>
      
      <div class="flex gap-3">
        <input id="player-name" type="text" placeholder="اسم اللاعب..." 
               class="flex-1 bg-white/20 rounded-2xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-pink-400"/>
        <button onclick="addPlayer()" 
                class="bg-pink-500 hover:bg-pink-600 px-8 rounded-2xl font-bold transition">
          + إضافة
        </button>
      </div>
    </div>

    <!-- اختيار المستوى والنوع -->
    <div class="grid grid-cols-2 gap-4 mb-8">
      <div>
        <label class="block text-sm mb-2">نوع السؤال</label>
        <select id="type" class="w-full bg-white/20 rounded-2xl px-5 py-4 focus:outline-none">
          <option value="random">عشوائي (Truth أو Dare)</option>
          <option value="truth">الحقيقة فقط</option>
          <option value="dare">التحدي فقط</option>
        </select>
      </div>
      <div>
        <label class="block text-sm mb-2">مستوى الصعوبة</label>
        <select id="difficulty" class="w-full bg-white/20 rounded-2xl px-5 py-4 focus:outline-none">
          <option value="easy">سهل 😊</option>
          <option value="medium" selected>متوسط 😏</option>
          <option value="hard">صعب 🔥</option>
          <option value="legendary">أسطوري ⚡</option>
        </select>
      </div>
    </div>

    <!-- زر البداية -->
    <button onclick="startGame()" 
            class="w-full py-6 text-3xl font-bold bg-gradient-to-r from-pink-500 to-purple-600 rounded-3xl hover:scale-105 transition shadow-2xl mb-10">
      🎲 ابدأ اللعبة دلوقتي!
    </button>

    <!-- منطقة السؤال -->
    <div id="game-area" class="hidden">
      <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-10 text-center question-box">
        <div id="current-player" class="text-3xl font-bold mb-6"></div>
        
        <div id="question" class="text-2xl min-h-[180px] flex items-center justify-center leading-relaxed px-6"></div>
        
        <div class="flex gap-4 mt-12">
          <button onclick="nextQuestion()" 
                  class="flex-1 py-4 bg-white text-purple-700 font-bold rounded-2xl hover:bg-gray-100 transition">
            السؤال الجاي →
          </button>
          <button onclick="skipQuestion()" 
                  class="flex-1 py-4 bg-transparent border-2 border-white/70 font-bold rounded-2xl hover:bg-white/10 transition">
            تخطي
          </button>
        </div>
      </div>

      <div class="flex justify-center gap-6 mt-8">
        <button onclick="endGame()" 
                class="px-8 py-3 bg-red-500/80 hover:bg-red-600 rounded-2xl transition">
          إنهاء الجلسة
        </button>
      </div>
    </div>
  </div>

  <script>
    // بيانات الأسئلة الأسطورية (موسعة جدًا)
    const data = {
      truth: {
        easy: ["إيه أكتر حاجة بتحبها في نفسك؟", "مين أكتر واحد بيضحكك في الجروب؟", "لو هتتجوز دلوقتي مين هتختار؟"],
        medium: ["أكبر سر مخبيه عن أهلك؟", "لو رجع الزمن، إيه أول حاجة هتغيرها؟", "مين الشخص اللي بتحبه بس مش قادر تقوله؟"],
        hard: ["أكبر كذبة قلتها في حياتك؟", "هل سبق وخنت حد؟", "إيه أكتر حاجة ندمان عليها؟"],
        legendary: ["لو تقدر تقتل شخص واحد بدون عقاب، مين هيكون؟", "أكتر حاجة عملتها وخجلت منها قدام نفسك؟"]
      },
      dare: {
        easy: ["غني أغنية دلوقتي 🎤", "اعمل 15 ضغطة 💪", "رقص 30 ثانية 🕺"],
        medium: ["اتصل بأمك وقولها إنك بحبها بصوت درامي", "رقص أغنية أطفال بجدية", "قلد شخص مشهور لمدة دقيقة"],
        hard: ["اعمل 50 ضغطة", "غني أغنية رومانسية وأنت بتبص في عيون حد", "ارفع صورة قديمة من معرضك"],
        legendary: ["اتصل بأي حد في الجروب وقوله 'أنا بحبك'", "ارقص وأنت لابس حاجة غريبة على راسك", "اعمل فيديو تيك توك دلوقتي"]
      }
    };

    let players = [];
    let currentPlayerIndex = 0;
    let used = new Set();

    function addPlayer() {
      const input = document.getElementById("player-name");
      const name = input.value.trim();
      if (name) {
        players.push(name);
        renderPlayers();
        input.value = "";
      }
    }

    function renderPlayers() {
      const list = document.getElementById("players-list");
      list.innerHTML = players.map((p, i) => `
        <div class="bg-white/20 px-5 py-2 rounded-2xl flex items-center gap-3">
          <span>${p}</span>
          <button onclick="removePlayer(${i})" class="text-red-400 hover:text-red-300">
            <i class="fas fa-times"></i>
          </button>
        </div>
      `).join("");
    }

    function removePlayer(index) {
      players.splice(index, 1);
      renderPlayers();
    }

    function getRandomQuestion(type, difficulty) {
      const category = type === "truth" ? data.truth : data.dare;
      let questions = category[difficulty] || category.medium;

      let available = questions.filter(q => !used.has(q));
      if (available.length === 0) {
        used.clear();
        available = questions;
      }

      const q = available[Math.floor(Math.random() * available.length)];
      used.add(q);
      return q;
    }

    function startGame() {
      if (players.length < 2) {
        alert("أضف على الأقل لاعبين 2 عشان اللعبة تبقى ممتعة! 😄");
        return;
      }
      document.getElementById("game-area").classList.remove("hidden");
      currentPlayerIndex = 0;
      used.clear();
      nextQuestion();
    }

    function nextQuestion() {
      const typeSelect = document.getElementById("type").value;
      const difficulty = document.getElementById("difficulty").value;

      let type = typeSelect;
      if (type === "random") {
        type = Math.random() > 0.5 ? "truth" : "dare";
      }

      const question = getRandomQuestion(type, difficulty);
      const player = players[currentPlayerIndex];

      document.getElementById("current-player").innerHTML = `
        دور <span class="text-yellow-300">${player}</span> 
        <span class="text-4xl">${type === "truth" ? "🧠" : "🔥"}</span>
      `;
      document.getElementById("question").innerHTML = `<p class="text-3xl">${question}</p>`;

      currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
    }

    function skipQuestion() {
      if (confirm("متأكد عايز تخطي السؤال ده؟")) {
        nextQuestion();
      }
    }

    function endGame() {
      if (confirm("هل عايز تنهي الجلسة دلوقتي؟")) {
        document.getElementById("game-area").classList.add("hidden");
        alert("شكرًا إنك لعبت معانا! 🎉\nعايز تبدأ جلسة جديدة؟ اضغط على الزر الأول");
      }
    }

    // دعم إضافة لاعب بالضغط على Enter
    document.getElementById("player-name").addEventListener("keypress", e => {
      if (e.key === "Enter") addPlayer();
    });
  </script>
</body>
</html>
